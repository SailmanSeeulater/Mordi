apiVersion: apps/v1
kind: Deployment
metadata:
  name: mordi-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mordi-frontend
  template:
    metadata:
      labels:
        app: mordi-frontend
    spec:
      containers:
        - name: mordi-frontend
          image: mordi-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mordi-frontend
spec:
  selector:
    app: mordi-frontend
  ports:
    - port: 80
      targetPort: 80
