version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: mordi-postgres
    environment:
      POSTGRES_DB: mordi
      POSTGRES_USER: mordi_user
      POSTGRES_PASSWORD: mordi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: mordi-redis
    restart: always

  backend:
    build: ./backend
    container_name: mordi-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mordi
      SPRING_DATASOURCE_USERNAME: mordi_user
      SPRING_DATASOURCE_PASSWORD: mordi_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MORDI_JWT_SECRET: mordi_super_secret_key_that_is_long_enough_for_hs256
      MORDI_JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
    container_name: mordi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
