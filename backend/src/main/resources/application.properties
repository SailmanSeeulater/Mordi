# Application
spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/mordi
spring.datasource.username=mordi_user
spring.datasource.password=mordi_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.preperties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Server
server.port=8080

# JWT
mordi.jwt.secret=mordi_super_secret_key_that_should_be_long_enough_for_hs256
mordi.jwt.expiration=86400000
